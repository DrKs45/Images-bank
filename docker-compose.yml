services:
  web:
    build: .
    container_name: tp-stockage-web
    ports:
      - "8086:80"
    volumes:
      - ./.src:/var/www/html
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: tp-stockage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: Password
      POSTGRES_DB: db_images
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  db-viewer:
    image: adminer
    container_name: tp-stockage-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"

volumes:
  pg_data: